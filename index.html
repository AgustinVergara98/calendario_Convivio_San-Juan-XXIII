<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Convivio</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f2}

/* HEADER */
header{
    background:#2f3e46;
    color:white;
    padding:10px;
}

.header-container{
    display:flex;
    align-items:center;
    gap:10px;
}

#logo{width:200px;}

#fraseLogo{font-size:12px;opacity:0.9}

#organizadoresTexto{font-size:13px;color:#FFD700}

#liturgia{
    font-size:12px;
    margin-top:5px;
}

/* CONTROLES */
.controles{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    padding:10px;
}

button,select,input{
    padding:8px;
    border-radius:6px;
    border:none;
}

/* CALENDARIO */
#calendario{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    padding:10px;
}

.dia{
    background:white;
    min-height:80px;
    font-size:12px;
    padding:5px;
    border-radius:8px;
}

.hoy{
    border:2px solid #C9A227;
    background:#fff8e1;
}

/* EVENTOS */
.evento{
    font-size:10px;
    margin-top:3px;
    padding:2px;
    border-radius:4px;
    color:white;
}

/* PANEL */
#panel{padding:10px}

@media(max-width:600px){
    .dia{min-height:70px;font-size:11px}
}
</style>
</head>

<body>

<header>
<div class="header-container">
    <img src="logo.png" id="logo">
    <div>
        <h2 id="mesActual"></h2>
        <div id="fraseLogo">“La paz comienza con una sonrisa.” — San Juan XXIII</div>
        <div id="organizadoresTexto"></div>
        <div id="liturgia"></div>
    </div>
</div>
</header>

<div class="controles">
<button onclick="cambiarMes(-1)">◀</button>
<button onclick="hoy()">Hoy</button>
<button onclick="cambiarMes(1)">▶</button>

<select id="filtro" onchange="render()">
<option value="">Todos</option>
<option>Convivio</option>
<option>Feriado</option>
<option>Cumple</option>
<option>Religioso</option>
</select>
</div>

<div id="calendario"></div>

<!-- PANEL -->
<div id="panel">
<input id="f_fecha" placeholder="dd/mm/aaaa">
<input id="f_act" placeholder="Actividad">
<select id="f_tipo">
<option>Convivio</option>
<option>Feriado</option>
<option>Cumple</option>
<option>Religioso</option>
</select>
<input id="f_enc" placeholder="Encargado">
<button onclick="guardarEvento()">Guardar</button>
</div>

<script>

/* CONFIG */

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNCek6zPSBLG96i9Rw3vWwKEUoXf_9CoTNQL5xHit4_jFS4mmHO_c8zsEQXVLJKfvxumtx6nL6ZdPi/pub?gid=470000808&single=true&output=csv";

let eventos=[];
let fechaActual=new Date();

/* ORGANIZADORES */
const organizadoresMes={
    0:"Equipo Enero",
    1:"Equipo Febrero",
    2:"Leo, Tato, Juli",
    3:"Mes sin Convivio",
    4:"Delfi, Agustín, Stefi",
    5:"Jorge, Ana, Guada",
    6:"Pachi, Marti, Maria",
    7:"Agustin y Ana",

};

/* COLORES */
const coloresLiturgicos={
    verde:"#4A7856",
    rojo:"#B33939",
    morado:"#6A4C93",
    blanco:"#d6d6d6",
    rosa:"#E6A4C4",
    dorado:"#C9A227"
};

function color(t){
    return {Convivio:"#4A7856",Feriado:"#B33939",Cumple:"#C9A227",Religioso:"#6A4C93"}[t]||"#999";
}

/* FECHA */
function normalizar(f){
    if(f.includes("-")) return f;
    let p=f.split("/");
    return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
}

/* LITURGIA */
async function cargarLiturgia(){

    let f=fechaActual;
    let fecha=`${f.getFullYear()}-${String(f.getMonth()+1).padStart(2,"0")}-${String(f.getDate()).padStart(2,"0")}`;

    try{
        const res=await fetch(`https://liturgiaargentina.org/api/v1/celebracion/${fecha}`);
        const data=await res.json();

        document.querySelector("header").style.background =
            coloresLiturgicos[data.color] || "#2f3e46";

        document.getElementById("liturgia").innerHTML=
            `<b>${data.santo || ""}</b> | ${data.tiempo || ""}`;

    }catch{
        document.getElementById("liturgia").innerText="";
    }
}

/* CARGAR EVENTOS */
async function cargar(){
    const res=await fetch(CSV_URL);
    const txt=await res.text();

    eventos=txt.trim().split("\n").slice(1).map(f=>{
        let c=f.split(",");
        return {
            fecha:normalizar(c[0]),
            actividad:c[1],
            tipo:c[2],
            encargado:c[3]
        };
    });

    render();
}

/* RENDER */
function render(){

    let cal=document.getElementById("calendario");
    cal.innerHTML="";

    let año=fechaActual.getFullYear();
    let mes=fechaActual.getMonth();

    document.getElementById("mesActual").innerText=
        fechaActual.toLocaleDateString("es-ES",{month:"long",year:"numeric"});

    document.getElementById("organizadoresTexto").innerText=
        "Organizan: "+(organizadoresMes[mes]||"—");

    let primerDia=new Date(año,mes,1).getDay();
    let diasMes=new Date(año,mes+1,0).getDate();

    for(let i=0;i<primerDia;i++){
        cal.appendChild(document.createElement("div"));
    }

    for(let d=1; d<=diasMes; d++){

        let fechaStr=`${año}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        let div=document.createElement("div");
        div.className="dia";

        let fechaObj=new Date(año,mes,d);
        if(fechaObj.toDateString()===new Date().toDateString()){
            div.classList.add("hoy");
        }

        div.innerHTML=`<b>${d}</b>`;

        let filtro=document.getElementById("filtro").value;

        eventos.filter(e=>e.fecha===fechaStr && (!filtro||e.tipo===filtro))
        .forEach(ev=>{
            let e=document.createElement("div");
            e.className="evento";
            e.style.background=color(ev.tipo);
            e.innerText=ev.actividad;
            div.appendChild(e);
        });

        cal.appendChild(div);
    }

    cargarLiturgia();
}

/* GUARDAR */
async function guardarEvento(){

    let data={
        fecha:normalizar(f_fecha.value),
        actividad:f_act.value,
        tipo:f_tipo.value,
        encargado:f_enc.value
    };

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify(data)
    });

    alert("Guardado ✅");
    cargar();
}

/* CONTROLES */
function hoy(){
    fechaActual=new Date();
    render();
}

function cambiarMes(n){
    fechaActual.setMonth(fechaActual.getMonth()+n);
    render();
}

/* INIT */
cargar();

</script>

</body>
</html>
